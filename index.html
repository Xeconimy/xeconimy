<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xeconimy – The AI‑Powered Economy for Creators</title>
    <style>
        /* ... same CSS as before (you can keep the existing styles) ... */
    </style>
</head>
<body>
    <!-- same header, features, etc. -->

    <section class="waitlist">
        <div class="container">
            <div class="form-container">
                <h2>Join the Waitlist</h2>
                <p>Be the first to experience Xeconimy.</p>

                <!-- Use Formspree endpoint with redirect to your thank-you page -->
                <form action="https://formspree.io/f/mbdzjzgw" method="POST">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="interest">I am a…</label>
                        <select id="interest" name="interest" required>
                            <option value="" disabled selected>Select one</option>
                            <option value="seller">Seller / Entrepreneur</option>
                            <option value="creator">Creator / Influencer</option>
                            <option value="shopper">Shopper / Early Adopter</option>
                        </select>
                    </div>
                    <!-- Hidden field to tell Formspree where to redirect -->
                    <input type="hidden" name="_redirect" value="https://xeconimy.github.io/xeconimy/thank-you.html">
                    <button type="submit">Join the Waitlist</button>
                </form>

                <p style="font-size:0.875rem; color:#9ca3af; margin-top:16px;">
                    No spam, ever. Unsubscribe anytime.
                </p>
            </div>
        </div>
    </section>

    <!-- same footer -->
</body>
</html>
